name: Publish Docker Image

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - variant: cpu
            gpu_enable: "false"
            suffix: ""
          - variant: gpu
            gpu_enable: "true"
            suffix: "-gpu"
    steps:
      - uses: actions/checkout@v6

      - name: Read versions from .env.example
        id: config
        run: |
          echo "slurm_version=$(grep '^SLURM_VERSION=' .env.example | cut -d= -f2)" >> "$GITHUB_OUTPUT"
          echo "builder_base=$(grep '#BUILDER_BASE=.*nvidia' .env.example | sed 's/^#//' | cut -d= -f2)" >> "$GITHUB_OUTPUT"
          echo "runtime_base=$(grep '#RUNTIME_BASE=.*nvidia' .env.example | sed 's/^#//' | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image (${{ matrix.variant }})
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            SLURM_VERSION=${{ steps.config.outputs.slurm_version }}
            GPU_ENABLE=${{ matrix.gpu_enable }}
            BUILDER_BASE=${{ matrix.variant == 'gpu' && steps.config.outputs.builder_base || 'rockylinux/rockylinux:9' }}
            RUNTIME_BASE=${{ matrix.variant == 'gpu' && steps.config.outputs.runtime_base || 'rockylinux/rockylinux:9' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/slurm-docker-cluster:latest${{ matrix.suffix }}
            ${{ secrets.DOCKERHUB_USERNAME }}/slurm-docker-cluster:${{ steps.config.outputs.slurm_version }}${{ matrix.suffix }}
            ${{ secrets.DOCKERHUB_USERNAME }}/slurm-docker-cluster:${{ steps.config.outputs.slurm_version }}${{ matrix.suffix }}-${{ github.event.release.tag_name }}
