[defaults]
# Inventory
inventory = ./inventory/slurm_inventory.py

# Roles path
roles_path = ./roles

# Collections path
collections_paths = ./collections

# Callback plugins
callback_plugins = ./callbacks
callbacks_enabled = maintenance_progress

# Performance tuning
forks = 50
pipelining = true
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout = 3600

# SSH settings
host_key_checking = false
timeout = 30
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o UserKnownHostsFile=/dev/null

# Output
stdout_callback = yaml
display_skipped_hosts = false
display_ok_hosts = true

# Retry files
retry_files_enabled = false

# Logging
log_path = /var/log/ansible/ansible.log

[inventory]
# Enable inventory plugins
enable_plugins = script, yaml, ini

[privilege_escalation]
become = true
become_method = sudo
become_user = root
become_ask_pass = false

[ssh_connection]
# Optimize for large-scale operations
pipelining = true
ssh_args = -o ControlMaster=auto -o ControlPersist=600s -o PreferredAuthentications=publickey
