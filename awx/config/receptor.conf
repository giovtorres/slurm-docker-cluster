# Receptor mesh network configuration
# Used for distributed AWX task execution

---
- node:
    id: awx-receptor

- log-level:
    level: info

- control-service:
    service: control
    filename: /var/run/receptor/receptor.sock

- work-command:
    worktype: local
    command: /usr/bin/ansible-runner
    params: worker
    allowruntimeparams: true

- work-signing:
    privatekey: /etc/receptor/signing/work-private-key.pem
    tokenexpiration: 1m

- tls-server:
    name: receptor-tls
    cert: /etc/receptor/tls/receptor.crt
    key: /etc/receptor/tls/receptor.key
    requireclientcert: false

- tcp-listener:
    port: 27199
    tls: receptor-tls
